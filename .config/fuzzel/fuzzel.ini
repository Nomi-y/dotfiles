dpi-aware=no
icons-enabled=no
width=25
font=Jetbrains Mono:weight=bold:size=16
line-height=25
fields=name,generic,filename
terminal=wezterm -e
prompt="❯ "
show-actions=no
exit-on-keyboard-focus-loss=yes
keyboard-focus=on-demand
lines=3
minimal-lines=yes

[colors]
text=e6d5c3ff
selection-text=e6d5c3ff
message=e6d5c3ff
prompt=e6d5c3ff
input=e6d5c3ff

background=2a2422ff
selection=5a3e34ff
border=b35a42ff

[border]
radius=10
width=2

[dmenu]
exit-immediately-if-empty=yes

